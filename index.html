<!DOCTYPE html>
<html lang="en" data-theme="dragon">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://accounts.google.com https://ssl.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://ssl.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://ssl.gstatic.com https://ui-avatars.com https://server.arcgisonline.com https://*.tile.openstreetmap.org; connect-src 'self' data: blob: https://*.googleapis.com https://accounts.google.com https://*.firebaseio.com wss://*.firebaseio.com https://generativelanguage.googleapis.com https://api.openai.com https://api.anthropic.com https://*.sentry.io;" />
  <link rel="icon" type="image/svg+xml" href="/app_logo/logo.png" />
  <link rel="preload" as="image" href="/app_logo/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VoidFit AI | Fitness OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@300;500;900&family=JetBrains+Mono:wght@800&family=Rajdhani:wght@600;700&display=swap"
    rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Keep minimal inline CSS here for the pre-React loading screen only. */
    :root {
      /* NEON PURPLE DRAGON — DARK (default) */
      --background:       #050010;
      --surface:          #0A0023;
      --card:             #12003B;
      --primary-action:   #9D00FF;
      --secondary-action: #5B00C3;
      --accent:           #E040FB;
      --text-primary:     #F0E6FF;
      --text-secondary:   #B07FFF;
      --border:           #3A0080;
      --glass-bg:         rgba(10, 0, 35, 0.92);
      --glass-border:     rgba(157, 0, 255, 0.18);
      --shadow-soft:      rgba(157, 0, 255, 0.35);
      --neon-glow:        rgba(224, 64, 251, 0.75);
      --teddy-glow:       transparent;
      --dragon-scale:     linear-gradient(135deg, #9D00FF, #E040FB, #6700CC);
      --plush-gradient:   none;
      --overlay-bg:       rgba(0, 0, 0, 0.55);
      --overlay-blur:     16px;

      font-family: 'Outfit', 'Inter', sans-serif;
    }

    *, *::before, *::after {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--text-primary);
      transition: background-color 0.5s cubic-bezier(0.4,0,0.2,1), color 0.4s ease;
      overflow-x: hidden;
      height: 100vh;
      width: 100vw;
    }

    .modal-overlay {
      background: var(--overlay-bg);
      backdrop-filter: blur(var(--overlay-blur));
      -webkit-backdrop-filter: blur(var(--overlay-blur));
    }

    .glass-effect {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    #root {
      height: 100%;
      width: 100%;
    }

    #system-error-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #050010;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes ringPulse {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    @keyframes progressBar {
      0%   { left: -100%; }
      100% { left: 100%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-background">
  <div id="root">
    <div style="height:100dvh;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050010;color:#E040FB;text-align:center;padding:20px;overflow:hidden;position:fixed;inset:0;">

      <!-- Ambient glow orbs -->
      <div style="position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(157,0,255,0.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;"></div>
      <div style="position:absolute;width:250px;height:250px;background:radial-gradient(circle,rgba(224,64,251,0.10),transparent 70%);top:30%;left:60%;transform:translate(-50%,-50%);pointer-events:none;"></div>

      <!-- Logo + pulse rings -->
      <div style="position:relative;margin-bottom:28px;animation:fadeInUp 0.8s ease both;">
        <div style="position:absolute;inset:-16px;border-radius:50%;border:2px solid rgba(157,0,255,0.4);animation:ringPulse 2s ease-out infinite;"></div>
        <div style="position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(224,64,251,0.3);animation:ringPulse 2s ease-out 0.5s infinite;"></div>
        <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#9D00FF,#E040FB);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(157,0,255,0.6);">
          <img src="/app_logo/logo.png" style="width:52px;height:52px;object-fit:contain;" alt="VoidFit" />
        </div>
      </div>

      <!-- Title -->
      <div style="font-family:'Outfit','Inter',sans-serif;font-size:36px;font-weight:900;letter-spacing:0.08em;text-shadow:0 0 25px rgba(224,64,251,0.6);animation:fadeInUp 0.8s 0.2s ease both;opacity:0;animation-fill-mode:both;">VOIDFIT <span style="color:#9D00FF;">AI</span></div>

      <!-- Subtitle -->
      <div class="pulse" style="font-family:'Outfit','JetBrains Mono',monospace;font-size:10px;letter-spacing:0.45em;font-weight:700;color:#B07FFF;margin-top:8px;text-transform:uppercase;animation:fadeInUp 0.8s 0.4s ease both;opacity:0;animation-fill-mode:both;">CONNECTING TO YOUR COACH</div>

      <!-- Progress bar -->
      <div style="margin-top:40px;width:220px;height:2px;background:rgba(157,0,255,0.15);position:relative;overflow:hidden;border-radius:2px;animation:fadeInUp 0.8s 0.6s ease both;opacity:0;animation-fill-mode:both;">
        <div style="position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,#E040FB,transparent);animation:progressBar 1.8s ease-in-out infinite;box-shadow:0 0 12px #E040FB;"></div>
      </div>
    </div>
  </div>


  
  <script type="module" src="/index.tsx"></script>
</body>

</html>
